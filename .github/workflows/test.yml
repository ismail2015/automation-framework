name: Run Automation Tests

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '11'

      - name: Run Maven Tests
        run: mvn clean test

      - name: Generate Allure Report
        run: mvn allure:serve
